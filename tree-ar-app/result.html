<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="나무 측정 결과">
    <title>측정 결과 — TreeMeasure</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .gps-info {
            width: 100%;
            max-width: 480px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 14px 20px;
            margin-bottom: 24px;
            font-size: 0.82rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .gps-info .icon {
            font-size: 1.2rem;
        }

        .gps-coords {
            font-family: 'Fira Code', monospace;
            font-size: 0.78rem;
            color: var(--text);
        }
    </style>
</head>

<body>

    <div class="result-page">
        <div class="result-header">
            <a href="measure.html" class="btn-back">← 새 측정</a>
            <h1 class="result-title">📊 측정 결과</h1>
            <a href="index.html" class="btn-back">홈 🏠</a>
        </div>

        <!-- Captured image -->
        <div class="result-image-container" id="resultImageContainer">
            <canvas id="resultCanvas"></canvas>
        </div>

        <!-- Measurement data -->
        <div class="result-data">
            <div class="data-card">
                <div class="data-value" id="resultHeight">—</div>
                <div class="data-label">높이 (m)</div>
            </div>
            <div class="data-card">
                <div class="data-value" id="resultWidth">—</div>
                <div class="data-label">폭 (m)</div>
            </div>
            <div class="data-card full-width">
                <div class="data-value" id="resultDistance">—</div>
                <div class="data-label">측정 거리 (m)</div>
            </div>
        </div>

        <!-- GPS info -->
        <div class="gps-info" id="gpsInfo" style="display:none;">
            <span class="icon">📍</span>
            <div>
                <div style="margin-bottom:2px;">GPS 위치</div>
                <div class="gps-coords" id="gpsCoords">—</div>
            </div>
        </div>

        <!-- Actions -->
        <div class="result-actions">
            <button class="btn-secondary" id="saveBtn">
                💾 저장
            </button>
            <button class="btn-success" id="shareBtn">
                📤 공유
            </button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/storage.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const data = JSON.parse(sessionStorage.getItem('measurementResult') || '{}');

            // 측정값 표시
            if (data.height != null) {
                document.getElementById('resultHeight').textContent =
                    typeof data.height === 'number' ? data.height.toFixed(2) : data.height;
            }
            if (data.width != null) {
                document.getElementById('resultWidth').textContent =
                    typeof data.width === 'number' ? data.width.toFixed(2) : data.width;
            }
            if (data.distance != null) {
                document.getElementById('resultDistance').textContent =
                    typeof data.distance === 'number' ? data.distance.toFixed(2) : data.distance;
            }

            // GPS 표시
            if (data.gps && data.gps.lat && data.gps.lng) {
                document.getElementById('gpsInfo').style.display = 'flex';
                document.getElementById('gpsCoords').textContent =
                    `${data.gps.lat.toFixed(6)}, ${data.gps.lng.toFixed(6)} (±${Math.round(data.gps.accuracy || 0)}m)`;
            }

            // 캡처 이미지 복원
            if (data.imageData) {
                const canvas = document.getElementById('resultCanvas');
                const ctx = canvas.getContext('2d');
                const img = new Image();
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                };
                img.src = data.imageData;
            }

            // 저장 버튼
            document.getElementById('saveBtn').addEventListener('click', async () => {
                try {
                    await TreeStorage.save({
                        ...data,
                        timestamp: Date.now(),
                    });
                    showToast('💾 저장되었습니다');
                } catch (e) {
                    showToast('저장 실패: ' + e.message);
                }
            });

            // 공유 버튼
            document.getElementById('shareBtn').addEventListener('click', async () => {
                let shareText = `🌳 나무 측정 결과\n`;
                shareText += `높이: ${data.height?.toFixed(2) || '—'}m\n`;
                shareText += `폭: ${data.width?.toFixed(2) || '—'}m\n`;
                shareText += `거리: ${data.distance?.toFixed(2) || '—'}m`;

                if (data.gps && data.gps.lat) {
                    shareText += `\n📍 GPS: ${data.gps.lat.toFixed(6)}, ${data.gps.lng.toFixed(6)}`;
                }

                if (navigator.share) {
                    try {
                        await navigator.share({ title: 'TreeMeasure 결과', text: shareText });
                    } catch (e) { /* 취소 */ }
                } else {
                    await navigator.clipboard.writeText(shareText);
                    showToast('📋 클립보드에 복사됨');
                }
            });
        });

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
    </script>
</body>

</html>
