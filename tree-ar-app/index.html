<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="나무에 마커를 부착하고 스마트폰 카메라로 높이·폭을 측정하는 WebAR 앱">
    <title>🌳 TreeMeasure — 나무 측정 WebAR</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <main class="landing" id="landing">
        <div class="landing-icon">🌳</div>
        <h1 class="landing-title">TreeMeasure</h1>
        <p class="landing-subtitle">
            마커를 나무에 부착하고 카메라로 비추면<br>
            <strong>높이와 폭</strong>을 자동으로 측정합니다
        </p>

        <div class="mode-cards">
            <a href="measure.html" class="mode-card touch-mode">
                <div class="mode-card-icon">👆</div>
                <strong class="mode-card-title">터치 측정</strong>
                <p class="mode-card-desc">화면을 터치해<br>높이·폭 측정</p>
            </a>
            <a href="tilt.html" class="mode-card tilt-mode">
                <div class="mode-card-icon">📳</div>
                <strong class="mode-card-title">기울기 측정</strong>
                <p class="mode-card-desc">폰을 기울여<br>높이 측정</p>
            </a>
            <a href="measure3p/measure3p.html" class="mode-card mode-3p">
                <div class="mode-card-icon">🎯</div>
                <strong class="mode-card-title">3점 측정</strong>
                <p class="mode-card-desc">QR 보정 + 3터치<br>높이·폭 동시 측정</p>
                <span class="mode-card-badge">실험적</span>
            </a>
        </div>

        <a href="history.html" class="btn-secondary" style="margin-top: 16px;">
            <span>📋</span> 측정 기록 보기
        </a>

        <div class="features">
            <div class="feature-card">
                <div class="feature-icon">📷</div>
                <div class="feature-label">카메라 기반</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">🎯</div>
                <div class="feature-label">마커 인식</div>
            </div>
            <div class="feature-card">
                <div class="feature-icon">📏</div>
                <div class="feature-label">자동 측정</div>
            </div>
        </div>
    </main>

</body>

</html>
