<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="QR 마커 기반 나무 높이·폭 측정">
    <title>측정 중 — TreeMeasure</title>

    <!-- jsQR: QR 코드 감지 라이브러리 -->
    <script src="js/jsqr.min.js"></script>

    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 카메라 비디오 전체화면 */
        #cameraVideo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            background: #000;
        }

        /* Mode toggle */
        .mode-toggle {
            display: flex;
            gap: 4px;
            padding: 3px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
        }

        .mode-btn {
            padding: 5px 14px;
            border: none;
            border-radius: 16px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .mode-btn.active {
            background: rgba(108, 140, 255, 0.9);
            color: #fff;
            box-shadow: 0 2px 8px rgba(108, 140, 255, 0.3);
        }

        .btn-next {
            padding: 10px 24px;
            border: none;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            background: rgba(108, 140, 255, 0.9);
            color: #fff;
            box-shadow: 0 2px 12px rgba(108, 140, 255, 0.4);
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .btn-next.btn-end {
            background: rgba(74, 222, 128, 0.9);
            box-shadow: 0 2px 12px rgba(74, 222, 128, 0.4);
        }

        /* Distance info */
        .distance-info {
            position: fixed;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 110;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            display: none;
            white-space: nowrap;
        }

        .distance-info.visible {
            display: block;
        }

        .distance-info strong {
            color: #4ade80;
        }

        /* QR 나무 정보 패널 */
        .tree-info-panel {
            position: fixed;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 110;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(108, 140, 255, 0.4);
            border-radius: 10px;
            padding: 8px 16px;
            min-width: 180px;
            max-width: 80vw;
            display: none;
        }

        .tree-info-panel.visible {
            display: block;
        }

        .tree-info-id {
            font-size: 0.85rem;
            font-weight: 700;
            color: #6c8cff;
            margin-bottom: 4px;
        }

        .tree-info-meta {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.65);
            line-height: 1.5;
        }
    </style>
</head>

<body>

    <!-- Loading Overlay -->
    <div class="overlay-screen" id="loadingScreen">
        <div class="spinner"></div>
        <div class="overlay-icon">📷</div>
        <h2 class="overlay-title" id="loadingTitle">카메라 초기화 중...</h2>
        <p class="overlay-text" id="loadingText">
            카메라 권한 팝업이 뜨면 <strong>"허용"</strong>을 눌러주세요.<br>
            20×20cm QR 코드를 나무에 부착 후 비추세요.
        </p>
        <button class="btn-primary" id="retryBtn" style="display:none;">
            <span class="icon">🔄</span> 다시 시도
        </button>
    </div>

    <!-- Camera Video -->
    <video id="cameraVideo" autoplay playsinline muted style="display:none;"></video>

    <!-- Canvas Overlay (measurement lines) -->
    <canvas id="overlayCanvas"
        style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;"></canvas>

    <!-- Touch points container -->
    <div id="touchPointsContainer"
        style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:15;"></div>

    <!-- Status bar -->
    <div class="ar-status-bar" style="z-index:100;">
        <div class="status-badge status-scanning" id="statusBadge">
            <div class="status-dot"></div>
            <span id="statusText">QR 코드 검색 중...</span>
        </div>
        <a href="index.html" class="btn-round" title="홈으로">✕</a>
    </div>

    <!-- Distance info -->
    <div class="distance-info" id="distanceInfo">
        거리: <strong id="distanceValue">—</strong>m
    </div>

    <!-- QR 나무 정보 패널 -->
    <div class="tree-info-panel" id="treeInfoPanel">
        <div class="tree-info-id" id="treeInfoId">—</div>
        <div class="tree-info-meta" id="treeInfoMeta"></div>
    </div>

    <!-- Measurement display -->
    <div class="measurement-display" id="measurementDisplay" style="z-index:90;">
        <div class="measurement-card">
            <div class="measurement-value" id="measureValue">—</div>
            <div class="measurement-label" id="measureLabel">높이 (m)</div>
        </div>
    </div>

    <!-- Bottom controls -->
    <div class="ar-controls" style="z-index:100;">
        <div class="ar-guide-text" id="guideText">QR 코드를 카메라에 비추세요</div>
        <div class="ar-button-row">
            <button class="btn-round" id="torchBtn" title="플래시">🔦</button>
            <button class="btn-capture" id="captureBtn" title="포인트 찍기" disabled></button>
            <button class="btn-next" id="nextBtn" style="display:none;">다음 →</button>
            <button class="btn-next btn-end" id="endBtn" style="display:none;">종료 ✓</button>
            <button class="btn-round" id="resetBtn" title="초기화">↺</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="js/camera.js"></script>
    <script src="js/detector.js"></script>
    <script src="js/measure.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
